{% extends "base.html" %}
{% block title %}CVE知识库 - SCS Checker{% endblock %}
{% block content %}
<div class="container-fluid py-4 px-4" id="kbPage">

  <!-- Header -->
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h2 class="mb-1"><i class="bi bi-book"></i> CVE 知识库</h2>
      <p class="text-muted mb-0">漏洞情报检索、收藏管理与知识快照</p>
    </div>
    <div class="btn-group">
      <a href="/dashboard" class="btn btn-outline-info"><i class="bi bi-speedometer2"></i> 仪表盘</a>
      <a href="/" class="btn btn-outline-secondary"><i class="bi bi-house"></i> 首页</a>
    </div>
  </div>

  <!-- ===== Top: Search Bar ===== -->
  <div class="card dashboard-card mb-4">
    <div class="card-body">
      <div class="row g-2 align-items-center">
        <div class="col">
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-search"></i></span>
            <input type="text" class="form-control" id="kbSearchInput"
                   placeholder="搜索 CVE ID、包名、关键词...">
          </div>
        </div>
        <div class="col-auto">
          <select class="form-select" id="kbSevFilter" style="width:auto">
            <option value="all">全部级别</option>
            <option value="critical">严重</option>
            <option value="high">高危</option>
            <option value="medium">中危</option>
            <option value="low">低危</option>
          </select>
        </div>
        <div class="col-auto">
          <button class="btn btn-info" onclick="searchCVE()">
            <i class="bi bi-search"></i> 搜索
          </button>
        </div>
      </div>
    </div>
  </div>

  <div class="row g-3">

    <!-- ===== Middle: CVE Knowledge Card Grid ===== -->
    <div class="col-lg-9">
      <div class="row g-3" id="kbCardGrid">
        <div class="col-12">
          <div class="empty-state">
            <i class="bi bi-search"></i>
            <p>输入关键词搜索 CVE 知识库</p>
          </div>
        </div>
      </div>

      <!-- Pagination -->
      <nav class="mt-3" id="kbPagination" style="display:none">
        <ul class="pagination justify-content-center">
          <li class="page-item"><a class="page-link" href="#" onclick="kbPrevPage(event)">&laquo; 上一页</a></li>
          <li class="page-item active"><a class="page-link" href="#" id="kbCurrentPage">1</a></li>
          <li class="page-item"><a class="page-link" href="#" onclick="kbNextPage(event)">下一页 &raquo;</a></li>
        </ul>
      </nav>
    </div>

    <!-- ===== Right: Favorites List ===== -->
    <div class="col-lg-3">
      <div class="card dashboard-card h-100">
        <div class="card-header"><i class="bi bi-heart-fill"></i> 收藏夹</div>
        <div class="card-body" id="kbFavoritesList" style="max-height:600px; overflow-y:auto">
          <div class="empty-state">
            <i class="bi bi-heart"></i>
            <p>暂无收藏</p>
            <small class="text-muted">点击卡片上的心形图标收藏</small>
          </div>
        </div>
      </div>
    </div>

  </div>

  <!-- ===== Bottom: Snapshot Management ===== -->
  <div class="card dashboard-card mt-3">
    <div class="card-header d-flex justify-content-between align-items-center">
      <span><i class="bi bi-camera-fill"></i> 快照管理</span>
      <button class="btn btn-sm btn-outline-success" onclick="createSnapshot()">
        <i class="bi bi-plus-circle"></i> 创建快照
      </button>
    </div>
    <div class="card-body">

      <!-- Baseline Compare -->
      <div class="row g-3 mb-3">
        <div class="col-md-4">
          <label class="form-label text-muted"><i class="bi bi-camera"></i> 基线快照</label>
          <select class="form-select" id="snapshotBaseline">
            <option value="">-- 选择快照 --</option>
          </select>
        </div>
        <div class="col-md-4">
          <label class="form-label text-muted"><i class="bi bi-camera"></i> 对比快照</label>
          <select class="form-select" id="snapshotCompare">
            <option value="">-- 选择快照 --</option>
          </select>
        </div>
        <div class="col-md-4 d-flex align-items-end">
          <button class="btn btn-outline-warning w-100" onclick="compareSnapshots()">
            <i class="bi bi-arrow-left-right"></i> 基线对比
          </button>
        </div>
      </div>

      <!-- Snapshot List -->
      <div class="table-responsive">
        <table class="table table-dark table-hover mb-0" id="snapshotTable">
          <thead>
            <tr>
              <th style="width:50px">#</th>
              <th>快照名称</th>
              <th>CVE数量</th>
              <th>创建时间</th>
              <th>备注</th>
              <th style="width:120px">操作</th>
            </tr>
          </thead>
          <tbody id="snapshotTableBody">
            <tr><td colspan="6" class="text-center text-muted py-4">暂无快照</td></tr>
          </tbody>
        </table>
      </div>

    </div>
  </div>

</div>

<!-- CVE Detail Modal -->
<div class="modal fade" id="cveDetailModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="cveDetailTitle">CVE 详情</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="cveDetailBody"></div>
    </div>
  </div>
</div>

<!-- Snapshot Compare Result Modal -->
<div class="modal fade" id="snapshotCompareModal" tabindex="-1">
  <div class="modal-dialog modal-xl">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title"><i class="bi bi-arrow-left-right"></i> 快照基线对比</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="snapshotCompareBody"></div>
    </div>
  </div>
</div>

<!-- Toast Container -->
<div class="toast-container" id="toastContainer"></div>
{% endblock %}

{% block scripts %}
<script src="/static/js/kb.js?v=5.2"></script>
{% endblock %}
