<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SCS Checker - 供应链安全检测平台{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/static/css/style.css?v=5.2" rel="stylesheet">
</head>
<body>
    <!-- Particle Network Background -->
    <canvas id="particleCanvas"></canvas>

    <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">
                <i class="bi bi-shield-lock-fill"></i> SCS Checker
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMain">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navMain">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/"><i class="bi bi-house-door"></i> 首页</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/dashboard"><i class="bi bi-speedometer2"></i> 仪表盘</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/analytics"><i class="bi bi-graph-up-arrow"></i> 高级分析</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/alerts"><i class="bi bi-bell"></i> 告警中心</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/kb"><i class="bi bi-book"></i> CVE知识库</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/compare"><i class="bi bi-arrow-left-right"></i> 扫描对比</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/history"><i class="bi bi-clock-history"></i> 检测记录</a>
                    </li>
                </ul>
                <div class="navbar-nav" id="navUserArea">
                    <!-- Filled by auth.js -->
                </div>
                <span class="navbar-text text-muted ms-3">
                    <i class="bi bi-globe"></i> OSV.dev API &nbsp;|&nbsp; v5.0
                </span>
            </div>
        </div>
    </nav>

    <div class="main-content">
        {% block content %}{% endblock %}
    </div>

    <footer class="text-center py-3">
        <small class="text-muted">
            SCS Checker - 开源软件供应链安全检测平台 |
            Powered by OSV.dev &amp; PyPI API |
            &copy; 2026 软件安全课程设计
        </small>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="/static/js/app.js?v=5.2"></script>
    <script src="/static/js/auth.js?v=5.2"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
